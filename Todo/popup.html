<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="todo-container">
    <header class="top-bar">
      <h1 class="app-title">To-Do List</h1>
      <button type="button" id="theme-toggle" class="icon-btn" title="Theme: system / light / dark" aria-label="Cycle theme">Aa</button>
    </header>

    <form id="todo-form" class="todo-form">
      <input type="text" id="todo-input" placeholder="Enter a new task" autocomplete="off" aria-label="New task">
      <button type="submit" class="btn-primary">Add</button>
    </form>

    <div class="search-row">
      <input type="search" id="todo-search" placeholder="Search tasks…" autocomplete="off" aria-label="Search tasks">
    </div>

    <div class="filters" role="tablist" aria-label="Filter tasks">
      <button type="button" class="filter-btn active" data-filter="all" role="tab" aria-selected="true">All</button>
      <button type="button" class="filter-btn" data-filter="active" role="tab" aria-selected="false">Active</button>
      <button type="button" class="filter-btn" data-filter="completed" role="tab" aria-selected="false">Done</button>
    </div>

    <div class="toolbar toolbar-split">
      <label class="sort-label">
        <span class="visually-hidden">Sort</span>
        <select id="sort-mode" class="sort-select" aria-label="Sort tasks">
          <option value="manual">Manual order</option>
          <option value="due">Due date</option>
          <option value="priority">Priority</option>
        </select>
      </label>
      <button type="button" id="clear-completed" class="btn-secondary btn-compact" disabled>Clear done</button>
    </div>

    <div class="toolbar toolbar-split import-export-row">
      <button type="button" id="export-todos" class="btn-secondary btn-compact">Export JSON</button>
      <label class="btn-secondary btn-compact import-label">
        Import JSON
        <input type="file" id="import-todos" accept=".json,application/json" hidden>
      </label>
    </div>

    <div id="undo-bar" class="undo-bar" hidden role="status">
      <span>Task removed.</span>
      <button type="button" id="undo-delete" class="undo-btn">Undo</button>
    </div>

    <p id="empty-state" class="empty-state" hidden aria-live="polite"></p>
    <ul id="todo-list" class="todo-list" aria-label="Tasks"></ul>

    <p class="footer">Suhaas Nv · <a href="mailto:suhaasnvs@gmail.com">suhaasnvs@gmail.com</a></p>
  </div>
  <script src="js/popup.js"></script>
</body>
</html>
